<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - SmartMob Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;background:#f4f6fb;color:#333;padding:20px;}
h2{text-align:center;color:#6c63ff;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;margin-bottom:40px;}
th,td{border:1px solid #ccc;padding:10px;text-align:left;}
th{background:#6c63ff;color:#fff;}
tr:nth-child(even){background:#e9ecef;}
section{margin-bottom:50px;}
</style>
</head>
<body>
<h2>Admin Panel - SmartMob Hub</h2>

<section id="ordersSection">
<h3>Orders</h3>
<table id="ordersTable">
<tr>
<th>#</th>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Payment Method</th>
<th>Items</th>
<th>Total</th>
</tr>
</table>
</section>

<section id="repairsSection">
<h3>Repair Requests</h3>
<table id="repairsTable">
<tr>
<th>#</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Problem</th>
</tr>
</table>
</section>

<script>
let ordersTable = document.getElementById('ordersTable');
let repairsTable = document.getElementById('repairsTable');

function loadAdminData(){
    let orders = JSON.parse(localStorage.getItem('orders')||'[]');
    let repairs = JSON.parse(localStorage.getItem('repairs')||'[]');

    ordersTable.innerHTML=`<tr>
<th>#</th><th>Name</th><th>Phone</th><th>Address</th><th>Payment Method</th><th>Items</th><th>Total</th></tr>`;
    repairsTable.innerHTML=`<tr>
<th>#</th><th>Name</th><th>Phone</th><th>Email</th><th>Problem</th></tr>`;

    orders.forEach((o,i)=>{
        let items=o.items.map(it=>`${it.name} x${it.qty}`).join('<br>');
        let row = ordersTable.insertRow();
        row.innerHTML=`<td>${i+1}</td><td>${o.name}</td><td>${o.phone}</td><td>${o.address}</td><td>${o.method}</td><td>${items}</td><td>${o.total}</td>`;
    });

    repairs.forEach((r,i)=>{
        let row = repairsTable.insertRow();
        row.innerHTML=`<td>${i+1}</td><td>${r.name}</td><td>${r.phone}</td><td>${r.email}</td><td>${r.problem}</td>`;
    });
}

// Initial load
loadAdminData();
// Refresh every 2 sec automatically
setInterval(loadAdminData,2000);
</script>
</body>
</html>
